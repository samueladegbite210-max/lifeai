<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeAI - AI Life Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen">
    <div class="max-w-2xl mx-auto p-4">
        <header class="bg-emerald-700 p-6 rounded-3xl text-white mb-6">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-brain text-4xl"></i>
                    <div>
                        <h1 class="text-3xl font-bold">LifeAI</h1>
                        <p class="text-emerald-100">Global AI Life Assistant</p>
                    </div>
                </div>
                <button onclick="toggleDark()" class="text-3xl">🌙</button>
            </div>
        </header>

        <div class="bg-emerald-600 text-white p-6 rounded-3xl mb-8">
            <p id="ai-text" class="italic">"You're making good progress on your goals."</p>
            <button onclick="newInsight()" class="text-sm underline mt-4">New Insight</button>
        </div>

        <div class="flex border-b mb-6">
            <button onclick="switchTab(0)" class="flex-1 py-4 tab-active" id="tab0">Tasks</button>
            <button onclick="switchTab(1)" class="flex-1 py-4" id="tab1">Budget</button>
            <button onclick="switchTab(2)" class="flex-1 py-4" id="tab2">Goals</button>
            <button onclick="switchTab(3)" class="flex-1 py-4" id="tab3">Habits</button>
        </div>

        <div id="content"></div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('lifeai')) || {tasks:[], expenses:[], goals:[{name:"Emergency Fund", target:1000000, current:450000}], habits:[]};

        function save() { localStorage.setItem('lifeai', JSON.stringify(data)); }

        function switchTab(n) {
            document.querySelectorAll('button').forEach((b,i) => b.classList.toggle('tab-active', i===n));
            const content = document.getElementById('content');
            if (n === 0) {
                content.innerHTML = `<button onclick="addTask()" class="w-full py-4 bg-emerald-600 text-white rounded-3xl mb-6">+ New Task</button><div id="tasklist"></div>`;
                renderTasks();
            } else if (n === 1) {
                content.innerHTML = `<button onclick="addExpense()" class="w-full py-4 bg-emerald-600 text-white rounded-3xl">+ Add Expense</button><div id="explist" class="mt-6"></div>`;
                renderExpenses();
            } else if (n === 2) {
                content.innerHTML = `<div id="goallist"></div>`;
                renderGoals();
            } else {
                content.innerHTML = `<button onclick="addHabit()" class="w-full py-4 bg-emerald-600 text-white rounded-3xl">+ New Habit</button><div id="habitlist"></div>`;
                renderHabits();
            }
        }

        function addTask() {
            const t = prompt("New task?");
            if(t) { data.tasks.push({text:t, done:false}); save(); renderTasks(); }
        }

        function renderTasks() {
            document.getElementById('tasklist').innerHTML = data.tasks.map((t,i) => `
                <div class="bg-white dark:bg-gray-800 p-5 rounded-3xl flex gap-4">
                    <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${i})">
                    <span class="${t.done?'line-through':''}">${t.text}</span>
                </div>
            `).join('');
        }

        function toggleTask(i) {
            data.tasks[i].done = !data.tasks[i].done;
            save();
            renderTasks();
        }

        function addExpense() {
            const amt = prompt("Amount?");
            if(amt) { data.expenses.push({amount:parseFloat(amt), date:new Date().toLocaleDateString()}); save(); renderExpenses(); }
        }

        function renderExpenses() {
            document.getElementById('explist').innerHTML = data.expenses.map(e => `
                <div class="flex justify-between py-3 border-b">
                    <span>${e.date}</span>
                    <span>- ₦${e.amount}</span>
                </div>
            `).join('');
        }

        function renderGoals() {
            document.getElementById('goallist').innerHTML = data.goals.map(g => `
                <div class="bg-white dark:bg-gray-800 p-5 rounded-3xl">
                    <div class="flex justify-between"><span>${g.name}</span><span>${Math.round(g.current/g.target*100)}%</span></div>
                    <div class="h-2 bg-gray-200 rounded-full mt-3"><div class="h-2 bg-emerald-500 rounded-full" style="width:${g.current/g.target*100}%"></div></div>
                </div>
            `).join('');
        }

        function addHabit() {
            const name = prompt("Habit name?");
            if(name) { data.habits.push({name}); save(); renderHabits(); }
        }

        function renderHabits() {
            document.getElementById('habitlist').innerHTML = "<p class='text-center py-8 text-gray-500'>Habits coming soon</p>";
        }

        function newInsight() {
            const list = ["You're making good progress!", "Review budget weekly.", "Consistency wins!"];
            document.getElementById("ai-text").textContent = `"${list[Math.floor(Math.random()*list.length)]}"`;
        }

        function toggleDark() {
            document.documentElement.classList.toggle('dark');
        }

        window.onload = () => { switchTab(0); newInsight(); };
    </script>
</body
</html>
